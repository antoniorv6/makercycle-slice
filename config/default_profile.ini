# Default PrusaSlicer profile for MakerCycle cloud slicing.
# Used as fallback when the .3mf doesn't contain an embedded profile.
# Based on PrusaSlicer's "0.20mm QUALITY" preset for a generic FDM printer.

# Printer
nozzle_diameter = 0.4
bed_shape = 0x0,220x0,220x220,0x220

# Print settings
layer_height = 0.2
first_layer_height = 0.2
perimeters = 2
top_solid_layers = 5
bottom_solid_layers = 4
fill_density = 15%
fill_pattern = grid
infill_every_layers = 1

# Speed
perimeter_speed = 45
infill_speed = 80
solid_infill_speed = 40
top_solid_infill_speed = 30
travel_speed = 150
first_layer_speed = 20

# Filament
filament_type = PLA
filament_density = 1.24
filament_diameter = 1.75
temperature = 210
bed_temperature = 60

# Support
support_material = 0
